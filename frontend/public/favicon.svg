<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#2D6A4F"/>

  <!-- Cow head -->
  <!-- Main face -->
  <ellipse cx="32" cy="36" rx="16" ry="14" fill="#F5E6C8"/>

  <!-- Ears -->
  <ellipse cx="14" cy="30" rx="5" ry="7" fill="#F5E6C8" transform="rotate(-15 14 30)"/>
  <ellipse cx="14" cy="30" rx="3" ry="4.5" fill="#E8B4A0" transform="rotate(-15 14 30)"/>
  <ellipse cx="50" cy="30" rx="5" ry="7" fill="#F5E6C8" transform="rotate(15 50 30)"/>
  <ellipse cx="50" cy="30" rx="3" ry="4.5" fill="#E8B4A0" transform="rotate(15 50 30)"/>

  <!-- Horns -->
  <path d="M20 22 Q14 12 18 8" stroke="#C8A96E" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M44 22 Q50 12 46 8" stroke="#C8A96E" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Spots on face -->
  <ellipse cx="26" cy="28" rx="5" ry="6" fill="#8B6347" opacity="0.4"/>
  <ellipse cx="40" cy="26" rx="4" ry="5" fill="#8B6347" opacity="0.35"/>

  <!-- Eyes -->
  <circle cx="25" cy="32" r="4" fill="white"/>
  <circle cx="39" cy="32" r="4" fill="white"/>
  <circle cx="26" cy="32" r="2.5" fill="#2C1A0E"/>
  <circle cx="40" cy="32" r="2.5" fill="#2C1A0E"/>
  <!-- Eye shine -->
  <circle cx="27" cy="31" r="0.8" fill="white"/>
  <circle cx="41" cy="31" r="0.8" fill="white"/>

  <!-- Nostrils / Snout -->
  <ellipse cx="32" cy="43" rx="9" ry="6" fill="#E8C4A0"/>
  <ellipse cx="28" cy="43" rx="2.5" ry="2" fill="#C49080"/>
  <ellipse cx="36" cy="43" rx="2.5" ry="2" fill="#C49080"/>

  <!-- Small IQ text hint — pulse dot -->
  <circle cx="49" cy="17" r="5" fill="#52B788"/>
  <text x="49" y="20.5" font-family="Arial" font-size="6" font-weight="bold" fill="white" text-anchor="middle">IQ</text>
</svg>
