<!DOCTYPE html>
<html>
<head>
    <title>
        Login
    </title>
    <style>
        body{
            margin : 0;
            padding : 0;
            background-image=:url("{}");
            background-size: cover;


            height: 100vh;
            
            display: flex;
            justify-content:center; {% comment %} y axis mid point  {% endcomment %}
            align-items:center;{% comment %} x axins mid point {% endcomment %}

        }

        .Login-box{
            width: 350px;
            padding: 40px;

            background: rgba(0,0,0,0.4);  {% comment %} 60 percent visible {% endcomment %}
            backdrop-filter: blur(5px);   {% comment %} BLURR EFFECT {% endcomment %}
            border-radius: 10px;
            color: white;

        }
        .Login-box h2 {
            margin: 0 0 30px;
            padding: 0;
            color: #fff;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }




    button {
    background-color: #2e1a33; 
    color: white;
    border: none;
    padding: 10px 20px;
    width: 100%; 
    cursor: pointer; 
   }

    button:hover {
    background-color: #4a2b52; 
   }




   .user-box input {
    width: 100%;
    padding: 10px 0;
    color: white;
    border: none;
    border-bottom: 1px solid #fff; 
    background: transparent; 
    outline: none; 
}
 
.user-box {
    position: relative; 
    margin-bottom: 30px;
}

.user-box label {
    position: absolute; 
    top: 0;
    left: 0;
    transition: .5s;
}

.user-box input:focus ~ label,
.user-box input:valid ~ label {
    top: -20px;
    font-size: 12px;
    color: #bdb8b8;
}
</style>

</head>

<body>
    <div class = "Login-box">
    <h2>Add Animal Data</h2>
    
    <!-- Show Error/Success Messages -->
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li {% if message.tags == 'success' %} style="color: #4dff4d;" {% endif %}>
                {{ message }}
            </li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        
        <div class="user-box">
            <input type="text" name="animal_id" required="">
            <label>Animal ID</label>
        </div>
        
        <div class="user-box">
            <input type="text" name="animal_type" required="">
            <label>Type (e.g., Cow)</label>
        </div>
        
        <div class="user-box">
            <input type="number" name="age" required="">
            <label>Age</label>
        </div>
        
        <div class="user-box">
            <input type="text" name="sex" required="">
            <label>Sex (e.g., Male, Female)</label>
        </div>
        
        <div class="user-box">
            <input type="text" name="vaccination_detail" required="">
            <label>Vaccination Detail</label>
        </div>

        <!-- "Done" button -->
        <button type="submit">Done</button>
        
        <!-- "Back" button -->
        <!-- Note we use 'accounts:home' to be specific -->
        <button type="button" 
                onclick="location.href='{% url 'accounts:home' %}'" 
                style="background-color: transparent; border: 1px solid #fff; margin-top: 15px;">
            Back
        </button>
    </form>


    </div>
</body>
</html>
