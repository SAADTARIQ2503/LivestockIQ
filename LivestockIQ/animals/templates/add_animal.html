{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Animal Data</title>
    <!-- Font Awesome for Icons (using v6 standard CDN link) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLMDJ8uR0FMOQo2T8Y897E9uE9h/u0F9+5W1E9sW9uC1F1C1W1X1C1W1W1W1C1W1" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        /* Base styling */
        body {
            margin: 0;
            padding: 0;
            background-color: rgba(1, 147, 11, 0.56);
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; /* Modern font stack */
            font-size: 17px; /* Increased base font size */
            color: white; /* Stronger white color */
            display: flex; /* Enables sidebar layout */
            {% comment %} background-image: url("{% static 'accounts/BgImg.jpeg' %}"); {% endcomment %}
        }

        /* -------------------------------------- */
        /* 1. VERTICAL NAVIGATION BAR (Sidebar) */
        /* -------------------------------------- */
        .sidebar {
            width: 80px; 
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px; 
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(8px); 
            box-shadow: 3px 0 10px rgba(0, 0, 0, 0.6); 
            z-index: 100;
        }

        .nav-item a {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            color: inherit; 
            text-decoration: none; 
            position: relative; 
        }
        .nav-item {
            width: 100%;
            height: 60px; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative; 
            margin-bottom: 20px; 
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item i {
            font-size: 24px; 
            color: #ffffff;
            transition: color 0.2s;
        }

        /* Tooltip Styling */
        .tooltip {
            visibility: hidden;25px
            opacity: 0;
            background-color: #2b0c4d;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 5px 10px;
            position: absolute;
            z-index: 1;
            left: calc(100% + 15px);
            white-space: nowrap;
            transition: opacity 0.3s;
        }

        .nav-item:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .tooltip::after {
            content: "";
            position: absolute;
            top: 50%;
            right: 100%;
            margin-top: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: transparent #3b1c6d transparent transparent;
        }
        
        /* -------------------------------------- */
        /* 2. MAIN CONTENT & FORM CARD LAYOUT */
        /* -------------------------------------- */
        .main-content {
            margin-left: 90px; /* Offset content by new sidebar width */
            width: calc(100% - 90px); /* Use remaining width */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px; /* Increased padding */
            min-height: 100vh;
        }

        /* Form Card - Uses the login/signup blur effect */
        .form-card {
            width: 500px; /* Slightly increased width */
            padding: 45px; /* Increased padding */
            background: rgba(0, 0, 0, 0.5); /* Slightly darker background */
            backdrop-filter: blur(10px); /* Increased blur */
            border-radius: 8px; /* Slightly larger border radius */
            color: white;
            box-shadow: 0 6px 35px rgba(0, 0, 0, 0.7); /* Enhanced shadow */
        }

        .form-card h2 {
            margin: 0 0 35px; /* Increased margin */
            padding: 0;
            color: #fff;
            text-align: center;
            font-weight: 400; /* Slightly bolder */
            letter-spacing: 1.5px; /* Increased letter spacing */
            font-size: 28px; /* Increased font size */
        }

        /* -------------------------------------- */
        /* 3. INPUT FIELDS (Floating Labels) */
        /* -------------------------------------- */
        .user-box {
            position: relative; 
            margin-bottom: 35px; /* Increased margin */
        }

        .user-box input {
            width: 100%;
            padding: 10px 0; /* Increased padding */
            color: white;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.8); /* Bolder border */
            background: transparent; 
            outline: none; 
            font-size: 18px; /* Increased font size */
        }
        
        .user-box label {
            position: absolute; 
            top: 8px; /* Adjusted position */
            left: 0;
            transition: .3s; 
            color: rgba(255, 255, 255, 0.9); /* Lighter color */
            pointer-events: none;
            font-size: 18px; /* Increased font size */
        }

        .user-box input:focus ~ label,
        .user-box input:not(:placeholder-shown) ~ label {
            top: -22px; /* Adjusted position */
            font-size: 14px; /* Increased font size */
            color: #fff; 
        }

        .user-box select {
            width: 100%;
            padding: 10px 0; /* Increased padding */
            color: white;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.8); /* Bolder border */
            background: transparent; 
            outline: none; 
            font-size: 18px; /* Increased font size */
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-color: rgba(0, 0, 0, 0.5); /* Slightly darker */
        }

        .user-box select option {
            background-color: #3b1c6d; /* Slightly darker */
            color: white;
        }
        .user-box select:focus ~ label,
        .user-box select:valid ~ label {
            top: -22px; /* Adjusted position */
            font-size: 14px; /* Increased font size */
            color: #fff;
        }
        
        .user-box input:-webkit-autofill,
        .user-box input:-webkit-autofill:hover, 
        .user-box input:-webkit-autofill:focus {
            -webkit-text-fill-color: white;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* -------------------------------------- */
        /* 4. FILE UPLOAD & BUTTONS */
        /* -------------------------------------- */

        /* Style for the "Upload pics" text label */
        .upload-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px; 
            padding: 10px 0; 
        }

        .upload-text {
            font-size: 18px; 
            color: rgba(255, 255, 255, 0.9); 
        }
        
        .upload-button {
            
            background-color: #3b1c6d; 
            color: white;
            border: none;
            padding: 12px 30px; 
            cursor: pointer; 
            border-radius: 3px; 
            font-size: 16px; 
            letter-spacing: 1.2px; 
            transition: background 0.3s;
        }

        .upload-button:hover {
            background-color: #5d2b9d; /* Lighter hover color */
        }

        /* Hide the default file input field */
        #file-upload {
            display: none;
        }

        /* Footer links */
        .form-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 45px; /* Increased margin */
        }

        .footer-link {
            color: #60e4ff; /* Slightly brighter color */
            text-decoration: none;
            font-weight: 700; /* Bolder */
            font-size: 18px; /* Increased font size */
            cursor: pointer;
            padding: 7px 12px; /* Increased padding */
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: #fff;
        }
        .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .switch {
          position: relative;
          display: inline-block;
          width: 50px;
          height: 24px;
        }

        .switch input { 
          opacity: 0;
          width: 0;
          height: 0;
        }

        .slider {
          position: absolute;
          cursor: pointer;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background-color: #ccc;
          transition: .4s;
          border-radius: 24px;
        }

        .slider:before {
          position: absolute;
          content: "";
          height: 16px;
          width: 16px;
          left: 4px;
          bottom: 4px;
          background-color: white;
          transition: .4s;
          border-radius: 50%;
        }

        input:checked + .slider {
          background-color: #28a745; /* Green for Healthy/ON */
        }
        
        input:not(:checked) + .slider {
          background-color: #dc3545; /* Red for Not Healthy/OFF */
        }

        input:checked + .slider:before {
          transform: translateX(26px);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="nav-item">
            <a href="{% url 'accounts:home' %}"><i class="fa-solid fa-house"></i><span class="tooltip">Home</span></a>
        </div>
        <div class="nav-item">
            <a href="{% url 'animals:select_method' %}"><i class="fas fa-cow"></i><span class="tooltip">Add Animal</span></a>  
        </div>
        <div class="nav-item">
            <a href="{% url 'health:vaccination_schedule' %}"><i class="fa-regular fa-calendar active-icon"></i><span class="tooltip">Vaccination Schedule</span></a>
        </div>
        <div class="nav-item">
            <a href="{% url 'environment:view_data' %}"><i class="fas fa-thermometer-half"></i><span class="tooltip">Environmental Data</span></a>
        </div>
        <div class="nav-item">
            <a href="{% url 'alerts:anomalies' %}"><i class="fa-regular fa-eye"></i><span class="tooltip">Anomalies</span></a>
        </div>
        <div class="nav-item">
            <a href="{% url 'animals:search_livestock' %}"><i class="fas fa-search"></i><span class="tooltip">Search Livestock</span></a>
        </div>
        <div class="nav-item">
            <a href="{% url 'calculate_cost:calculator' %}"><i class="fas fa-calculator "></i><span class="tooltip">Calculate Cost</span></a>
        </div>
    </div>

    <div class="main-content">
        <div class="form-card">
            <h2>Add Animal Data</h2>
            <div id="message-container" style="text-align: center; margin-bottom: 20px;"></div>
            <form id="add-animal-form" method="POST" enctype="multipart/form-data">
                {% csrf_token %} 
                
                <div class="user-box">
                    <select name="type" required="">
                        <option value="" disabled selected hidden></option>
                        <option value="Cow">Cow</option>
                        <option value="Goat">Goat</option>
                        <option value="Sheep">Sheep</option>
                    </select>
                    <label>Type:</label>
                </div>
                
                <div class="user-box">
                    <select name="age" id="age-select" required="">
                        <option value="" disabled selected hidden> </option>
                    </select>
                    <label>Age:</label>
                </div>

                <div class="user-box">
                    <input type="text" name="sex" required="" pattern="[MFmf]" maxlength="1" title="Please enter 'M' for Male or 'F' for Female." placeholder=" ">
                    <label>Sex (M/F):</label>
                </div>
                
                <div class="toggle-container">
                    <span>Animal is Not Healthy</span>
                    <label class="switch">
                        <input type="checkbox" id="healthToggle" name="is_healthy" checked>
                        <span class="slider"></span>
                    </label>
                    <span>Animal is Healthy</span>
                </div>
                
                <div class="user-box" id="requiredVaccineField" style="display: none;">
                    <div style="position: relative;">
                        <select name="required_vaccine">
                            <option value="" disabled selected hidden></option>
                            {% for vaccine in available_vaccines %}
                            <option value="{{ vaccine }}">{{ vaccine }}</option>
                            {% endfor %}
                        </select>
                        <label>Required Vaccine:</label>
                    </div>
                </div>

                <div class="form-footer">
                    <a href="{% url 'animals:select_method' %}" class="upload-button" style="text-decoration: none;">Back</a>
                    <button type="submit" class="upload-button" >Add Animal</button>
                </div>
            </form>
        </div>
    </div>
<script>
        const ageRanges = {
            'Cow': [
                '0–6 months',
                '6–12 months',
                '1–2 years',
                '2+ years'
            ],
            'Sheep': [
                '0–12 months',
                '1–1.5 years',
                '1.5+ years'
            ],
            'Goat': [
                '0–6 months',
                '6–18 months',
                '1.5+ years'
            ]
        };

        const animalTypeSelect = document.querySelector('select[name="type"]');
        const ageSelect = document.getElementById('age-select');
        const healthToggle = document.getElementById('healthToggle');
        const vaccineField = document.getElementById('requiredVaccineField');
        const requiredVaccineSelect = vaccineField.querySelector('select[name="required_vaccine"]');


        function toggleRequired(selectElement, isRequired) {
             // We only set 'required' for the select if the animal is NOT healthy.
             if (selectElement) {
                selectElement.required = isRequired;
             }
        }
        
        // Function to toggle vaccine dropdown visibility
        function toggleVaccineField() {
            // is_healthy is checked = Healthy (display: none)
            // is_healthy is unchecked = Not Healthy (display: block)
            if (healthToggle.checked) {
                vaccineField.style.display = 'none';
                toggleRequired(requiredVaccineSelect, false);
                requiredVaccineSelect.value = ""; // Clear selection when hidden
            } else {
                vaccineField.style.display = 'block';
                toggleRequired(requiredVaccineSelect, true);
            }
        }
        
        // 1. Attach event listener to the health toggle
        healthToggle.addEventListener('change', toggleVaccineField);
        
        // 2. Initial call to set state correctly on load
        document.addEventListener('DOMContentLoaded', () => {
             toggleVaccineField(); // Set initial state
             
             // ... (rest of the age dropdown logic) ...
             if (animalTypeSelect.value) {
                populateAgeDropdown();
             }
             
             // --- AJAX submission listener (updated) ---
             document.getElementById('add-animal-form').addEventListener('submit', function(event) {
                 event.preventDefault();

                 const form = event.target;
                 const formData = new FormData(form);
                 const messageContainer = document.getElementById('message-container');
                 
                 // CRITICAL: Handle the checked state of the health toggle
                 // If checked, FormData will include 'is_healthy: on'.
                 // If unchecked, FormData will NOT include 'is_healthy'.
                 // The Django view handles this distinction.

                 fetch(form.action, {
                     method: 'POST',
                     body: formData,
                     headers: {
                         'X-Requested-With': 'XMLHttpRequest'
                     }
                 })
                 .then(response => response.json())
                 .then(data => {
                     messageContainer.innerHTML = `<p style="color: ${data.status === 'success' ? 'lightgreen' : 'salmon'};">${data.message}</p>`;
                     if (data.status === 'success') {
                         form.reset();
                         // CRITICAL: Reset the toggle and clear conditional fields
                         healthToggle.checked = true;
                         toggleVaccineField(); 
                         ageSelect.innerHTML = '<option value="" disabled selected hidden> </option>';
                         animalTypeSelect.value = "";
                     }
                 })
                 .catch(error => {
                     console.error('Error:', error);
                     messageContainer.innerHTML = `<p style="color: salmon;">An unexpected error occurred.</p>`;
                 });
             });
        });
        
        // Function to populate the age dropdown (kept from original script)
        function populateAgeDropdown() {
            const animalType = animalTypeSelect.value;
            const ages = ageRanges[animalType] || [];
            ageSelect.innerHTML = '<option value="" disabled selected hidden> </option>';
            ages.forEach(age => {
                const option = document.createElement('option');
                option.value = age;
                option.textContent = age;
                ageSelect.appendChild(option);
            });
        }
        
        // Attach the change event listener to the Type select (kept from original script)
        animalTypeSelect.addEventListener('change', populateAgeDropdown);
    </script>
</body>
</html>
