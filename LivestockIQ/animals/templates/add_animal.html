{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Animal Data</title>
    <!-- Font Awesome for Icons (using v6 standard CDN link) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLMDJ8uR0FMOQo2T8Y897E9uE9h/u0F9+5W1E9sW9uC1F1C1W1X1C1W1W1W1C1W1" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        /* Base styling */
        body {
            margin: 0;
            padding: 0;
            /* Using the path specified in your latest context */
            background-image: url("{% static 'accounts/BgImg.jpeg' %}");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #fff;
            display: flex; /* Enables sidebar layout */
        }

        /* -------------------------------------- */
        /* 1. VERTICAL NAVIGATION BAR (Sidebar) */
        /* -------------------------------------- */
        .sidebar {
            width: 80px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(8px); 
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        /* Styling for the anchor tag (a) inside nav-item to make it fill the space */
        .nav-item a {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            color: inherit; /* Inherit icon color */
            text-decoration: none; /* Remove underline */
            position: relative; /* For tooltip positioning inside the link */
        }
        /* Reset nav-item to only style the link */
        .nav-item {
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative; 
            margin-bottom: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1); 
        }

        .nav-item i {
            font-size: 24px;
            color: #ffffff;
            transition: color 0.2s;
        }

        /* Tooltip Styling */
        .tooltip {
            visibility: hidden;
            opacity: 0;
            background-color: #2b0c4d; 
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 5px 10px;
            position: absolute;
            z-index: 1;
            left: calc(100% + 15px); /* Adjusted position relative to the link */
            white-space: nowrap;
            transition: opacity 0.3s;
        }

        /* Hover effect applied to the nav-item (which contains the link) */
        .nav-item:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .tooltip::after {
            content: "";
            position: absolute;
            top: 50%;
            right: 100%;
            margin-top: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: transparent #2b0c4d transparent transparent;
        }
        
        /* -------------------------------------- */
        /* 2. MAIN CONTENT & FORM CARD LAYOUT */
        /* -------------------------------------- */
        .main-content {
            margin-left: 80px; /* Offset content by sidebar width */
            width: calc(100% - 80px); /* Use remaining width */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        /* Form Card - Uses the login/signup blur effect */
        .form-card {
            width: 450px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.4);  
            backdrop-filter: blur(8px);  
            border-radius: 5px; 
            color: white;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .form-card h2 {
            margin: 0 0 30px;
            padding: 0;
            color: #fff;
            text-align: center;
            font-weight: 300;
            letter-spacing: 1px;
            font-size: 24px;
        }

        /* -------------------------------------- */
        /* 3. INPUT FIELDS (Floating Labels) */
        /* -------------------------------------- */
        .user-box {
            position: relative; 
            margin-bottom: 30px;
        }

        .user-box input {
            width: 100%;
            padding: 8px 0;
            color: white;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.7); 
            background: transparent; 
            outline: none; 
            font-size: 16px;
        }
        
        .user-box label {
            position: absolute; 
            top: 5px;
            left: 0;
            transition: .3s; 
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            font-size: 16px;
        }

        .user-box input:focus ~ label,
        .user-box input:not(:placeholder-shown) ~ label {
            top: -20px;
            font-size: 12px;
            color: #fff; 
        }

        .user-box input:-webkit-autofill,
        .user-box input:-webkit-autofill:hover, 
        .user-box input:-webkit-autofill:focus {
            -webkit-text-fill-color: white;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* -------------------------------------- */
        /* 4. FILE UPLOAD & BUTTONS */
        /* -------------------------------------- */

        /* Style for the "Upload pics" text label */
        .upload-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 8px 0;
        }

        .upload-text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .upload-button {
            /* Dark purple button styling */
            background-color: #2b0c4d; 
            color: white;
            border: none;
            padding: 10px 25px; 
            cursor: pointer; 
            border-radius: 2px;
            font-size: 14px;
            letter-spacing: 1px;
            transition: background 0.3s;
        }

        .upload-button:hover {
            background-color: #471d79; 
        }

        /* Hide the default file input field */
        #file-upload {
            display: none;
        }

        /* Footer links (Back and Done) */
        .form-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
        }

        .footer-link {
            color: #40c4ff; /* Bright blue color matching the image's "Back" and "Done" text */
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            padding: 5px 10px;
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: #fff;
        }
    </style>
</head>

<body>

    <!-- Vertical Navigation Bar (Same as home.html) -->
    <div class="sidebar">
        
        <div class="nav-item">
            <!-- Home: Using namespaced URL for inter-app linking -->
            <a href="{% url 'accounts:home' %}">
                <i class="fa-solid fa-house"></i>
                <span class="tooltip">Home</span>
            </a>
        </div>
        
        <div class="nav-item">
            <!-- Add Animal: Assumed to be in the current app's URL config -->
            <a href="{% url 'animals:add_animal' %}">
                <i class="fas fa-cow"></i> 
                <span class="tooltip">Add Animal</span>
            </a>
        </div>
        
        <div class="nav-item">
            <!-- Vaccination Schedule: Using namespaced URL for inter-app linking (assuming it's also in accounts) -->
            <a href="#">
                <i class="fa-regular fa-calendar"></i> 
                <span class="tooltip">Vaccination Schedule</span>
            </a>
        </div>
        
        <div class="nav-item">
            <!-- Environmental Data: Using namespaced URL for inter-app linking (assuming it's also in accounts) -->
            <a href="#">
                <i class="fas fa-thermometer-half"></i> 
                <span class="tooltip">Environmental Data</span>
            </a>
        </div>
        
        <div class="nav-item">
            <!-- Anomalies: Using namespaced URL for inter-app linking (assuming it's also in accounts) -->
            <a href="#">
                <i class="fa-regular fa-eye"></i>
                <span class="tooltip">Anomalies</span>
            </a>
        </div>
        
        <div class="nav-item">
            <!-- Search: Using namespaced URL for inter-app linking (assuming it's also in accounts) -->
            <a href="#">
                <i class="fas fa-search"></i>
                <span class="tooltip">Search Livestock</span>
            </a>
        </div>
        
    </div>

    <!-- Main Content Area: Centering the Add Animal Form -->
    <div class="main-content">
        <div class="form-card">
            <h2>Add Animal Data</h2>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %} 
                
                <div class="user-box">
                    <input type="text" name="animal_id" required="" placeholder=" ">
                    <label>Animal ID:</label>
                </div>

                <div class="user-box">
                    <input type="text" name="type" required="" placeholder=" ">
                    <label>Type:</label>
                </div>
                
                <div class="user-box">
                    <input type="number" name="age" required="" placeholder=" ">
                    <label>Age:</label>
                </div>

                <div class="user-box">
                    <input type="text" name="sex" required="" placeholder=" ">
                    <label>Sex:</label>
                </div>

                <div class="user-box">
                    <input type="text" name="vaccination_detail" required="" placeholder=" ">
                    <label>Vaccination Detail:</label>
                </div>

                <div class="upload-group">
                    <span class="upload-text">Upload pics:</span>
                    <!-- Hidden actual file input -->
                    <input type="file" name="pics" id="file-upload" accept="image/*">
                    <!-- Custom button to trigger the hidden file input -->
                    <label for="file-upload" class="upload-button">Upload</label>
                </div>

                <div class="form-footer">
                    <!-- CORRECTED: Back button using the namespaced URL -->
                    <a href="{% url 'accounts:home' %}" class="footer-link">Back</a>
                    
                    <!-- Done button should submit the form -->
                    <button type="submit" class="footer-link" style="background: none; border: none; padding: 0; color: inherit; cursor: pointer;">Done</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Placeholder script for any future interactivity.
        // The "Done" button is styled as a link/text but performs a submit action.
    </script>
</body>
</html>
