{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Animal Data</title>
    <!-- Font Awesome for Icons (using v6 standard CDN link) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLMDJ8uR0FMOQo2T8Y897E9uE9h/u0F9+5W1E9sW9uC1F1C1W1X1C1W1W1W1C1W1" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        /* Base styling */
        body {
            margin: 0;
            padding: 0;
            background-image: url("{% static 'accounts/BgImg.jpeg' %}");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; /* Modern font stack */
            font-size: 17px; /* Increased base font size */
            color: white; /* Stronger white color */
            display: flex; /* Enables sidebar layout */
        }

        /* -------------------------------------- */
        /* 1. VERTICAL NAVIGATION BAR (Sidebar) */
        /* -------------------------------------- */
        .sidebar {
            width: 90px; /* Slightly increased width */
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 25px; /* Increased padding */
            background: rgba(0, 0, 0, 0.5); /* Slightly darker background */
            backdrop-filter: blur(10px); /* Increased blur */
            box-shadow: 3px 0 15px rgba(0, 0, 0, 0.6); /* Enhanced shadow */
            z-index: 100;
        }

        .nav-item a {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            color: inherit; 
            text-decoration: none; 
            position: relative; 
        }
        .nav-item {
            width: 100%;
            height: 65px; /* Slightly increased height */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative; 
            margin-bottom: 25px; /* Increased margin */
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.15); /* Slightly more visible hover */
        }

        .nav-item i {
            font-size: 26px; /* Increased icon size */
            color: #ffffff;
            transition: color 0.2s;
        }

        /* Tooltip Styling */
        .tooltip {
            visibility: hidden;
            opacity: 0;
            background-color: #3b1c6d; /* Slightly different color */
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 7px 12px; /* Increased padding */
            position: absolute;
            z-index: 1;
            left: calc(100% + 18px); /* Adjusted position */
            white-space: nowrap;
            transition: opacity 0.3s;
        }

        .nav-item:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .tooltip::after {
            content: "";
            position: absolute;
            top: 50%;
            right: 100%;
            margin-top: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: transparent #3b1c6d transparent transparent;
        }
        
        /* -------------------------------------- */
        /* 2. MAIN CONTENT & FORM CARD LAYOUT */
        /* -------------------------------------- */
        .main-content {
            margin-left: 90px; /* Offset content by new sidebar width */
            width: calc(100% - 90px); /* Use remaining width */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px; /* Increased padding */
            min-height: 100vh;
        }

        /* Form Card - Uses the login/signup blur effect */
        .form-card {
            width: 500px; /* Slightly increased width */
            padding: 45px; /* Increased padding */
            background: rgba(0, 0, 0, 0.5); /* Slightly darker background */
            backdrop-filter: blur(10px); /* Increased blur */
            border-radius: 8px; /* Slightly larger border radius */
            color: white;
            box-shadow: 0 6px 35px rgba(0, 0, 0, 0.7); /* Enhanced shadow */
        }

        .form-card h2 {
            margin: 0 0 35px; /* Increased margin */
            padding: 0;
            color: #fff;
            text-align: center;
            font-weight: 400; /* Slightly bolder */
            letter-spacing: 1.5px; /* Increased letter spacing */
            font-size: 28px; /* Increased font size */
        }

        /* -------------------------------------- */
        /* 3. INPUT FIELDS (Floating Labels) */
        /* -------------------------------------- */
        .user-box {
            position: relative; 
            margin-bottom: 35px; /* Increased margin */
        }

        .user-box input {
            width: 100%;
            padding: 10px 0; /* Increased padding */
            color: white;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.8); /* Bolder border */
            background: transparent; 
            outline: none; 
            font-size: 18px; /* Increased font size */
        }
        
        .user-box label {
            position: absolute; 
            top: 8px; /* Adjusted position */
            left: 0;
            transition: .3s; 
            color: rgba(255, 255, 255, 0.9); /* Lighter color */
            pointer-events: none;
            font-size: 18px; /* Increased font size */
        }

        .user-box input:focus ~ label,
        .user-box input:not(:placeholder-shown) ~ label {
            top: -22px; /* Adjusted position */
            font-size: 14px; /* Increased font size */
            color: #fff; 
        }

        .user-box select {
            width: 100%;
            padding: 10px 0; /* Increased padding */
            color: white;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.8); /* Bolder border */
            background: transparent; 
            outline: none; 
            font-size: 18px; /* Increased font size */
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-color: rgba(0, 0, 0, 0.5); /* Slightly darker */
        }

        .user-box select option {
            background-color: #3b1c6d; /* Slightly darker */
            color: white;
        }
        .user-box select:focus ~ label,
        .user-box select:valid ~ label {
            top: -22px; /* Adjusted position */
            font-size: 14px; /* Increased font size */
            color: #fff;
        }
        
        .user-box input:-webkit-autofill,
        .user-box input:-webkit-autofill:hover, 
        .user-box input:-webkit-autofill:focus {
            -webkit-text-fill-color: white;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* -------------------------------------- */
        /* 4. FILE UPLOAD & BUTTONS */
        /* -------------------------------------- */

        /* Style for the "Upload pics" text label */
        .upload-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px; /* Increased margin */
            padding: 10px 0; /* Increased padding */
        }

        .upload-text {
            font-size: 18px; /* Increased font size */
            color: rgba(255, 255, 255, 0.9); /* Lighter color */
        }
        
        .upload-button {
            /* Dark purple button styling */
            background-color: #3b1c6d; /* Slightly different color */
            color: white;
            border: none;
            padding: 12px 30px; /* Increased padding */
            cursor: pointer; 
            border-radius: 3px; /* Slightly larger radius */
            font-size: 16px; /* Increased font size */
            letter-spacing: 1.2px; /* Adjusted letter spacing */
            transition: background 0.3s;
        }

        .upload-button:hover {
            background-color: #5d2b9d; /* Lighter hover color */
        }

        /* Hide the default file input field */
        #file-upload {
            display: none;
        }

        /* Footer links */
        .form-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 45px; /* Increased margin */
        }

        .footer-link {
            color: #60e4ff; /* Slightly brighter color */
            text-decoration: none;
            font-weight: 700; /* Bolder */
            font-size: 18px; /* Increased font size */
            cursor: pointer;
            padding: 7px 12px; /* Increased padding */
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: #fff;
        }
    </style>
</head>

<body>

    <!-- Vertical Navigation Bar  -->
   <div class="sidebar">
        
        <div class="nav-item">
            <a href="{% url 'accounts:home' %}"><i class="fa-solid fa-house"></i><span class="tooltip">Home</span></a>
        </div>
        <div class="nav-item">
            <a href="{% url 'animals:add_animal' %}"><i class="fas fa-cow"></i><span class="tooltip">Add Animal</span></a>
        </div>
        <div class="nav-item">
            <a href="{% url 'health:vaccination_schedule' %}"><i class="fa-regular fa-calendar active-icon"></i><span class="tooltip">Vaccination Schedule</span></a>
        </div>
        <div class="nav-item">
            <a href="{% url 'environment:view_data' %}"><i class="fas fa-thermometer-half"></i><span class="tooltip">Environmental Data</span></a>
        </div>
        <div class="nav-item">
            <a href="{% url 'alerts:anomalies' %}"><i class="fa-regular fa-eye"></i><span class="tooltip">Anomalies</span></a>
        </div>
        <div class="nav-item">
            <a href="{% url 'animals:search_livestock' %}"><i class="fas fa-search"></i><span class="tooltip">Search Livestock</span></a>
        </div>
        
    </div>

    <!-- Main Content Area: Centering the Add Animal Form -->
    <div class="main-content">
        <div class="form-card">
            <h2>Add Animal Data</h2>
            <div id="message-container" style="text-align: center; margin-bottom: 20px;"></div>
            <form id="add-animal-form" method="POST" enctype="multipart/form-data">
                {% csrf_token %} 
                
                <div class="user-box">
                    <input type="text" name="animal_id" required="" placeholder=" ">
                    <label>Animal ID:</label>
                </div>

                <div class="user-box">
                    <select name="type" required="">
                        <option value="" disabled selected hidden></option>
                        <option value="Cow">Cow</option>
                        <option value="Goat">Goat</option>
                        <option value="Sheep">Sheep</option>
                    </select>
                    <label>Type:</label>
                </div>
                
                <div class="user-box">
                    <select name="age" id="age-select" required="">
                        <option value="" disabled selected hidden> </option>
                    </select>
                    <label>Age:</label>
                </div>

                <div class="user-box">
                    <input type="text" name="sex" required="" pattern="[MFmf]" maxlength="1" title="Please enter 'M' for Male or 'F' for Female." placeholder=" ">
                    <label>Sex:</label>
                </div>

                <div class="user-box">
                    <input type="text" name="vaccination_detail" required="" placeholder=" ">
                    <label>Vaccination Detail:</label>
                </div>

                <div class="upload-group">
                    <span class="upload-text">Upload pics:</span>
                    <!-- Hidden actual file input -->
                    <input type="file" name="pics" id="file-upload" accept="image/*">
                    <!-- Custom button to trigger the hidden file input -->
                    <label for="file-upload" class="upload-button">Upload</label>
                </div>

                <div class="form-footer">
                    <!-- CORRECTED: Back button using the namespaced URL -->
                    <a href="{% url 'accounts:home' %}" class="footer-link">Back</a>
                    
                    <!-- Done button should submit the form -->
                    <button type="submit" class="footer-link" style="background: none; border: none; padding: 0; color: inherit; cursor: pointer;">Done</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const ageRanges = {
            'Cow': [
                '0–6 months',
                '6–12 months',
                '1–2 years',
                '2+ years'
            ],
            'Sheep': [
                '0–12 months',
                '1–1.5 years',
                '1.5 years'
            ],
            'Goat': [
                '0–6 months',
                '6–18 months',
                '1.5+ years'
            ]
        };

        const animalTypeSelect = document.querySelector('select[name="type"]');
        const ageSelect = document.getElementById('age-select');

        animalTypeSelect.addEventListener('change', (event) => {
            const animalType = event.target.value;
            const ages = ageRanges[animalType] || [];

            // Clear existing options
            ageSelect.innerHTML = '<option value="" disabled selected hidden>Select age range</option>';

            // Add new options
            ages.forEach(age => {
                const option = document.createElement('option');
                option.value = age;
                option.textContent = age;
                ageSelect.appendChild(option);
            });
        });

        document.getElementById('add-animal-form').addEventListener('submit', function(event) {
            event.preventDefault();

            const form = event.target;
            const formData = new FormData(form);
            const messageContainer = document.getElementById('message-container');

            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => response.json())
            .then(data => {
                messageContainer.innerHTML = `<p style="color: ${data.status === 'success' ? 'lightgreen' : 'salmon'};">${data.message}</p>`;
                if (data.status === 'success') {
                    form.reset();
                }
            })
            .catch(error => {
                console.error('Error:', error);
                messageContainer.innerHTML = `<p style="color: salmon;">An unexpected error occurred.</p>`;
            });
        });
    </script>
</body>
</html>
