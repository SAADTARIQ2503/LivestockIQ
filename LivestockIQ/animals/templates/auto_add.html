{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Add Animal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* Base & Sidebar Styles (Same as above) */
        body {
            margin: 0; padding: 0;
            background-image: url("{% static 'accounts/BgImg.jpeg' %}");
            background-size: cover; background-position: center;
            min-height: 100vh; font-family: 'Segoe UI', sans-serif;
            color: white; display: flex;
        }
        .sidebar {
            width: 80px; 
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px; 
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(8px); 
            box-shadow: 3px 0 10px rgba(0, 0, 0, 0.6); 
            z-index: 100;
        }

        .nav-item a {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            color: inherit; 
            text-decoration: none; 
            position: relative; 
        }
        .nav-item {
            width: 100%;
            height: 60px; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative; 
            margin-bottom: 20px; 
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item i {
            font-size: 24px; 
            color: #ffffff;
            transition: color 0.2s;
        }

        /* Tooltip Styling */
        .tooltip {
            visibility: hidden;25px
            opacity: 0;
            background-color: #2b0c4d;
            /* Dark purple tooltip background */
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 5px 10px;
            position: absolute;
            z-index: 1;
            left: calc(100% + 15px);
            white-space: nowrap;
            transition: opacity 0.3s;
        }

        .nav-item:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .tooltip::after {
            content: "";
            position: absolute;
            top: 50%;
            right: 100%;
            margin-top: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: transparent #3b1c6d transparent transparent;
        }


        /* --- AUTO ADD SPECIFIC STYLES --- */
        .main-content {
            margin-left: 90px; width: calc(100% - 90px);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        
        .status-card {
            width: 600px;
            padding: 50px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 50px rgba(96, 228, 255, 0.1);
        }

        /* Pulsing Animation for the icon */
        .scan-icon {
            font-size: 100px;
            color: #60e4ff;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 0 rgba(96, 228, 255, 0.4); transform: scale(1); }
            50% { text-shadow: 0 0 30px rgba(96, 228, 255, 0.8); transform: scale(1.1); }
            100% { text-shadow: 0 0 0 rgba(96, 228, 255, 0.4); transform: scale(1); }
        }

        h2 { font-weight: 300; font-size: 32px; letter-spacing: 2px; margin-bottom: 10px; }
        p { color: rgba(255,255,255,0.6); font-size: 18px; line-height: 1.6; }

        .loader-bar {
            width: 100%; height: 4px; background: rgba(255,255,255,0.1);
            margin-top: 30px; position: relative; overflow: hidden; border-radius: 2px;
        }
        .loader-bar::after {
            content: ''; position: absolute; left: -50%; width: 50%; height: 100%;
            background: #60e4ff; animation: load 2s infinite linear;
        }

        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }

        .back-btn {
            display: inline-block; margin-top: 40px; color: white; text-decoration: none;
            border: 1px solid rgba(255,255,255,0.3); padding: 10px 25px; border-radius: 30px;
            transition: 0.3s;
        }
        .back-btn:hover { background: white; color: black; }

    </style>
</head>
<body>

    <div class="sidebar">
        
        <div class="nav-item">
            <a href="{% url 'accounts:home' %}"><i class="fa-solid fa-house"></i><span class="tooltip">Home</span></a>
        </div>
        <div class="nav-item">
<a href="{% url 'animals:select_method' %}"><i class="fas fa-cow"></i><span class="tooltip">Add Animal</span></a>  
        </div>
        <div class="nav-item">
            <a href="{% url 'health:vaccination_schedule' %}"><i class="fa-regular fa-calendar active-icon"></i><span class="tooltip">Vaccination Schedule</span></a>
        </div>
        <div class="nav-item">
            <a href="{% url 'environment:view_data' %}"><i class="fas fa-thermometer-half"></i><span class="tooltip">Environmental Data</span></a>
        </div>
        <div class="nav-item">
            <a href="{% url 'alerts:anomalies' %}"><i class="fa-regular fa-eye"></i><span class="tooltip">Anomalies</span></a>
        </div>
        <div class="nav-item">
            <a href="{% url 'animals:search_livestock' %}"><i class="fas fa-search"></i><span class="tooltip">Search Livestock</span></a>
        </div>
        <div class="nav-item">
            <a href="{% url 'calculate_cost:calculator' %}"><i class="fas fa-calculator "></i><span class="tooltip">Calculate Cost</span></a>
        </div>
        
    </div>


    <div class="main-content">
        <div class="status-card">
            <i class="fa-solid fa-rss scan-icon"></i>
            
            <h2>SYSTEM ACTIVE</h2>
            <p>Scanning for RFID tags and Camera input...</p>
            <p style="font-size: 14px; margin-top: 5px;">Ensure the livestock is within the detection zone.</p>

            <div class="loader-bar"></div>

            <a href="{% url 'animals:select_method' %}" class="back-btn">Cancel / Go Back</a>
        </div>
    </div>

</body>
</html>
