{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        
        body {
            
            background-image: url("{% static 'accounts/BgImg.jpeg' %}");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff; 
        }

        .signup-container {
            
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(8px); 
            padding: 40px;
            border-radius: 5px; 
            width: 350px; 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); 
        }

        .signup-container h2 {
            text-align: center;
            font-weight: 300;
            margin-bottom: 30px;
            color: #fff;
            letter-spacing: 1px;
            font-size: 24px;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            padding: 8px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.7); 
            outline: none;
            color: #fff;
            font-size: 16px;
        }

        .input-group label {
            position: absolute;
            top: 5px;
            left: 0;
            pointer-events: none;
            transition: 0.3s;
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
        }

        
        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: -20px;
            font-size: 12px;
            color: #fff; 
        }
        
        .input-group input:-webkit-autofill,
        .input-group input:-webkit-autofill:hover, 
        .input-group input:-webkit-autofill:focus {
            -webkit-text-fill-color: white;
            transition: background-color 5000s ease-in-out 0s;
        }

        .signup-button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-size: 16px;
            letter-spacing: 1px;
            background: #2b0c4d; 
            color: #fff;
            transition: background 0.3s;
        }

        .signup-button:hover {
            background: #471d79;
        }
        
        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center; 
            margin-top: 25px; 
            margin-bottom: 25px; 
        }
        
       
        .no-account-text {
            color: rgba(255, 255, 255, 0.7); 
            font-size: 14px;
            font-weight: 300;
        }

        
        .signup-link {
            color: #60e4ff; 
            text-decoration: none;
            font-weight: 700;
            font-size: 14px; 
            padding: 5px 10px;
            border-radius: 3px;
            transition: background 0.2s, color 0.2s;
        }

        .signup-link:hover {
            color: #fff;
            background-color: rgba(96, 228, 255, 0.1); 
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <h2>SignUp</h2>
        <div id="message-container" style="text-align: center; margin-bottom: 20px;"></div>
        <form id="signup-form" method="POST">
            {% csrf_token %}

            <div class="input-group">
                <input type="text" name="username" id="username" required placeholder=" ">
                <label for="username">Username</label>
            </div>
            
            <div class="input-group">
                <input type="text" name="first_name" id="first_name" required placeholder=" ">
                <label for="first_name">First Name</label>
            </div>
            
            <div class="input-group">
                <input type="text" name="last_name" id="last_name" required placeholder=" ">
                <label for="last_name">Last Name</label>
            </div>

            <div class="input-group">
                <input type="email" name="email" id="email" required placeholder=" ">
                <label for="email">Email</label>
            </div>

            <div class="input-group">
                <input type="password" name="password" id="password" required placeholder=" ">
                <label for="password">Password</label>
            </div>

            <div class="input-group">
                <input type="password" name="password2" id="password2" required placeholder=" ">
                <label for="password2">Confirm Password</label>
            </div>
            <div class="form-footer">
                <span class="no-account-text">Already have an account?</span>
                <a href="{% url 'accounts:signin' %}" class="signup-link">Log In</a>
            </div>
            <button type="submit" class="signup-button">Sign Up</button>
        </form>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', function(event) {
            event.preventDefault();

            const form = event.target;
            const formData = new FormData(form);
            const messageContainer = document.getElementById('message-container');

            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => response.json())
            .then(data => {
                messageContainer.innerHTML = `<p style="color: ${data.status === 'success' ? 'lightgreen' : 'salmon'};">${data.message}</p>`;
                if (data.status === 'success') {
                    setTimeout(() => {
                        window.location.href = data.redirect_url;
                    }, 2000);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                messageContainer.innerHTML = `<p style="color: salmon;">An unexpected error occurred.</p>`;
            });
        });
    </script>
</body>
</html>
