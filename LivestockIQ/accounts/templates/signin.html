{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    
    <style>
        
        body {
            margin: 0;
            padding: 0;
            
            background-image: url("{% static 'accounts/BgImg.jpeg' %}");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #fff; 
        }
        .message-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            width: 350px;
        }

        .message-toast {
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            font-weight: 600;
            color: #fff;
            animation: slideIn 0.5s ease-out;
            opacity: 0.95;
            backdrop-filter: blur(5px);
            border-left: 5px solid; /* Base for status colors */
        }

        .message-toast.success {
            background: rgba(40, 167, 69, 0.8);
            border-left-color: #28a745;
        }

        .message-toast.error {
            background: rgba(220, 53, 69, 0.8);
            border-left-color: #dc3545;
        }

        .message-toast.warning {
            background: rgba(255, 193, 7, 0.8);
            color: #333;
            border-left-color: #ffc107;
        }

        .message-toast i {
            margin-right: 10px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 0.95;
            }
        }

        /* Form Container - Applies the frosted glass effect */
        .Login-box {
            width: 350px;
            padding: 40px;
            /* Semi-transparent dark background */
            background: rgba(0, 0, 0, 0.4);  
            /* The key blur effect matching the original image */
            backdrop-filter: blur(8px);  
            border-radius: 5px; /* Subtle rounding */
            color: white;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); /* Shadow for depth */
        }

        .Login-box h2 {
            margin: 0 0 30px;
            padding: 0;
            color: #fff;
            text-align: center;
            /* Match the subtle, spaced-out font from the original image */
            font-weight: 300;
            letter-spacing: 1px;
            font-size: 24px;
        }

        /* Input Group (for relative positioning of label) */
        .user-box {
            position: relative; 
            margin-bottom: 30px;
        }

        /* Input Field Styling */
        .user-box input {
            width: 100%;
            padding: 8px 0; /* Padding matched to original design */
            color: white;
            border: none;
            /* Light line for the input field */
            border-bottom: 1px solid rgba(255, 255, 255, 0.7); 
            background: transparent; 
            outline: none; 
            font-size: 16px;
        }
        
        /* Floating Label Styling */
        .user-box label {
            position: absolute; 
            top: 5px; /* Adjust label starting position */
            left: 0;
            transition: .3s; /* Smoother transition */
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            font-size: 16px;
        }

        /* Label movement on focus/valid content */
        .user-box input:focus ~ label,
        .user-box input:not(:placeholder-shown) ~ label {
            top: -20px;
            font-size: 12px;
            color: #fff; /* Pure white when focused */
        }

        /* Fix for input background on Webkit autofill */
        .user-box input:-webkit-autofill,
        .user-box input:-webkit-autofill:hover, 
        .user-box input:-webkit-autofill:focus {
            -webkit-text-fill-color: white;
            transition: background-color 5000s ease-in-out 0s;
        }


        /* Button Styling - Matching the dark purple from the image */
        button {
            /* Dark purple color from the image */
            background-color: #2b0c4d; 
            color: white;
            border: none;
            padding: 12px 20px; /* Increased padding for better match */
            width: 100%; 
            cursor: pointer; 
            border-radius: 2px;
            font-size: 16px;
            letter-spacing: 1px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #471d79; 
        }

        /* Ensure the form-footer is used for layout */
        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center; /* Vertically align items */
            margin-top: 25px; /* Adjust margin */
            margin-bottom: 25px; /* Add margin below the link block */
        }
        
        /* Style for the static "No account?" text */
        .no-account-text {
            color: rgba(255, 255, 255, 0.7); /* Subtle white color */
            font-size: 14px;
            font-weight: 300;
        }

        /* Style for the "Sign Up" link, making it distinct and clickable */
        .signup-link {
            color: #60e4ff; /* Slightly brighter color */
            text-decoration: none;
            font-weight: 700;
            font-size: 14px; /* Use a smaller, cleaner size */
            padding: 5px 10px;
            border-radius: 3px;
            transition: background 0.2s, color 0.2s;
        }

        .signup-link:hover {
            color: #fff;
            background-color: rgba(96, 228, 255, 0.1); /* Subtle hover background */
        }

        /* Remove the old, overly large footer-link styles */
        .footer-link {
            display: none; /* or remove this rule if it's not used elsewhere */
        }
    </style>

</head>

<body>
    <div class="message-container">
        {% if messages %}
        {% for message in messages %}
        <div class="message-toast {{ message.tags }}" role="alert">
            <i
                class="fas fa-{% if 'success' in message.tags %}check-circle{% elif 'error' in message.tags %}times-circle{% else %}exclamation-triangle{% endif %}"></i>
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
    </div>
    <div class = "Login-box">
        <h2>
            Login
        </h2>
        <div id="message-container" style="text-align: center; margin-bottom: 20px;"></div>
        <form id="signin-form" method="POST">
            {% csrf_token %} <!-- MANDATORY Django security tag -->
            
            <!-- Username/Email field -->
            <div class ="user-box">
                
                <input type="text" name="username" required="" placeholder=" ">
                <label>Username</label> 
                
            </div>
            <div class ="user-box">
                
                <input type="email" name="email" required="" placeholder=" ">
                <label>Email</label> 
                
            </div>

            <!-- Password field -->
            <div class ="user-box">
                <input type="password" name="password" required="" placeholder=" ">
                <label>Password</label>
            </div>
            <div class="form-footer">
                <span class="no-account-text">No account?</span>
                <a href="{% url 'accounts:signup' %}" class="signup-link">Sign Up</a>
            </div>
            <button type="submit"> Login </button>
        </form>
    </div>
    <script>
        // --- Django Message Auto-hide Script (Copied from home.html) ---
        document.addEventListener('DOMContentLoaded', function () {
            const messages = document.querySelectorAll('.message-toast');
            if (messages.length > 0) {
                messages.forEach(msg => {
                    setTimeout(() => {
                        msg.style.opacity = '0';
                        msg.style.transition = 'opacity 1s ease-out';
                        setTimeout(() => msg.remove(), 1000);
                    }, 5000);
                });
            }
        });
        
        // --- AJAX Form Submission Script ---
        document.getElementById('signin-form').addEventListener('submit', function(event) {
            event.preventDefault();

            const form = event.target;
            const formData = new FormData(form);
            // Use the top-level message container if needed, but for AJAX status, we'll keep the direct feedback for now
            // const messageContainer = document.getElementById('message-container'); 

            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => response.json())
            .then(data => {
                // Since Django handles success messages now (on redirect), we only need 
                // to show AJAX errors/status briefly or handle the redirect.
                
                // Show a quick message within the form area for AJAX feedback
                const formArea = form.closest('.Login-box');
                let ajaxMessage = document.createElement('p');
                ajaxMessage.style.color = data.status === 'success' ? 'lightgreen' : 'salmon';
                ajaxMessage.style.textAlign = 'center';
                ajaxMessage.style.marginBottom = '15px';
                ajaxMessage.innerText = data.message;

                // Insert the AJAX message dynamically above the form
                const existingMessage = form.previousElementSibling;
                if (existingMessage && existingMessage.tagName === 'P') {
                    existingMessage.remove(); // Remove previous AJAX message if any
                }
                form.insertAdjacentElement('beforebegin', ajaxMessage);

                if (data.status === 'success') {
                    // Successful login, redirect to home
                    setTimeout(() => {
                        window.location.href = data.redirect_url;
                    }, 500); // Reduce timeout for quicker login response
                }
            })
            .catch(error => {
                console.error('Error:', error);
                const formArea = form.closest('.Login-box');
                let ajaxMessage = document.createElement('p');
                ajaxMessage.style.color = 'salmon';
                ajaxMessage.style.textAlign = 'center';
                ajaxMessage.style.marginBottom = '15px';
                ajaxMessage.innerText = 'An unexpected error occurred.';
                form.insertAdjacentElement('beforebegin', ajaxMessage);
            });
        });
    </script>
</body>
</html>
