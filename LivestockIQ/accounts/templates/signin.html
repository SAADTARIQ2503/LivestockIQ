<!DOCTYPE html>
<html>
<head>
    <title>
        Login
    </title>
    <style>
        body{
            margin : 0;
            padding : 0;
            background-image=:url("{}");
            background-size: cover;


            height: 100vh;
            
            display: flex;
            justify-content:center; {% comment %} y axis mid point  {% endcomment %}
            align-items:center;{% comment %} x axins mid point {% endcomment %}

        }

        .Login-box{
            width: 350px;
            padding: 40px;

            background: rgba(0,0,0,0.4);  {% comment %} 60 percent visible {% endcomment %}
            backdrop-filter: blur(5px);   {% comment %} BLURR EFFECT {% endcomment %}
            border-radius: 10px;
            color: white;

        }
        .Login-box h2 {
            margin: 0 0 30px;
            padding: 0;
            color: #fff;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }




    button {
    background-color: #2e1a33; 
    color: white;
    border: none;
    padding: 10px 20px;
    width: 100%; 
    cursor: pointer; 
   }

    button:hover {
    background-color: #4a2b52; 
   }




   .user-box input {
    width: 100%;
    padding: 10px 0;
    color: white;
    border: none;
    border-bottom: 1px solid #fff; 
    background: transparent; 
    outline: none; 
}
 
.user-box {
    position: relative; 
    margin-bottom: 30px;
}

.user-box label {
    position: absolute; 
    top: 0;
    left: 0;
    transition: .5s;
}

.user-box input:focus ~ label,
.user-box input:valid ~ label {
    top: -20px;
    font-size: 12px;
    color: #bdb8b8;
}
</style>

</head>

<body>
    <div class = "Login-box">
    <h2>
        Login
    </h2>
    <form method = POST>
        <div class ="user-box">
        <input type = "email" name ="email" required ="">
        <label>Email</label>
        </div>

        <div class ="user-box">
        <input type = "password" name ="password" required ="">
        <label>Password</label>
        </div>

        <button type = "submit"> Login </button>
    </form>


    </div>
</body>
</html>
