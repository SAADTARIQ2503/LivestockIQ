{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to LivestockIQ</title>
    
    <style>
        body {
            /* Use the same background image and styling as other pages */
            margin: 0;
            padding: 0;
            background-image: url("{% static 'accounts/BgImg.jpeg' %}");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .welcome-container {
            /* A simple frosted glass container for the content */
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            padding: 40px 60px;
            border-radius: 8px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-weight: 300;
            font-size: 36px;
            margin-bottom: 30px;
            letter-spacing: 1px;
            color: #ffc107; /* Highlighted welcome text */
        }

        .nav-links a {
            color: #40c4ff; /* Bright blue link color */
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            padding: 10px 15px;
            margin: 0 10px;
            border: 2px solid transparent;
            border-radius: 4px;
            transition: color 0.3s, border-color 0.3s;
        }

        .nav-links a:hover {
            color: #fff;
            border-color: #2b0c4d; /* Subtle purple hover border */
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h2>Welcome to LivestockIQ!</h2>
        <div class="nav-links">
            <!-- Assumed Django URL names for signup/signin exist in accounts app -->
            <a href="{% url 'accounts:signup' %}">Sign Up</a> 
            <span>|</span>
            <a href="{% url 'accounts:signin' %}">Sign In</a>
        </div>
    </div>
</body>
</html>
